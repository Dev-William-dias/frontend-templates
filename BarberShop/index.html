<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Shop</title>
    <link rel="icon" href="imgs/logo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section id="section-logo">
            <div>
                <img src="imgs/logo.jpeg" alt="">
            </div>
        </section>
        <section id="section-actions">
            <div class="div-actions general-div">
                <h1>Bem Vindo(a) Barber Shop</h1>
                <a class="btn" href="register.html">Cadastro</a>
                <a class="btn" href="login.html">Login</a>
            </div>
            <div class="div-contacts general-div">
                <h2>Entre em Contato Conosco</h2>
                <div class="contact-item">
                    <img class="icon" src="imgs/tell.jpeg" alt="icon">
                    <p>
                        <span class="contact-tile">  Ligue ou Mande mensagem:</span>
                    </p> 
                    <p class="p-data">(00) 00000-0000</p>
                </div>
                <div class="contact-item">
                    <img class="icon" src="imgs/email.jpeg" alt="icon email">
                    <p>
                        <span class="contact-tile">Envie um e-mail:</span>
                    </p>
                    <p class="p-data">barberShop@gmail.com</p>
                </div>
                <div class="contact-item">
                    <img class="icon" src="imgs/local.jpeg" alt="icon local">
                    <p>
                        <span class="contact-tile">Endereço:</span>
                    </p>
                    <p class="p-data">------</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
