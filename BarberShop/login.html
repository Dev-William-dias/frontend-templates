<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Shop - login</title>
    <link rel="icon" href="imgs/logo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section id="section-logo">
            <div>
                <img src="imgs/logo.jpeg" alt="">
            </div>
        </section>
        <section id="section-login">
            <div class="div-form d-login">
                <h2>Login</h2>
                <p>Novo no site? <a href="register.html">Regitre-se</a></p>
                <form class="form-form">
                    <label for="email-txt">E-mail</label>
                    <input  type="text" id="email-txt" name="email-txt">
                    <label  for="password-txt">Senha</label>
                    <input  type="password" id="password-txt" name="password-txt">
                    <button class="btn" type="submit">Entrar</button>           
                </form>
            </div>
            <div class="div-exit">
                <a class="btn" href="index.html">Voltar</a>
            </div> 
        </section>
    </main>
</body>
</html>
