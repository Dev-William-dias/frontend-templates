<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Shop - register</title>
    <link rel="icon" href="imgs/logo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section id="section-logo">
            <div>
                <img src="imgs/logo.jpeg" alt="">
            </div>
        </section>
        <section id="section-register">
            <div class="div-form d-register">
                <h2>Registri-se</h2>
                <form class="form-form">
                    <label for="name-txt">Nome</label>
                    <input type="text" id="name-txt" name="name-txt" required>
                    <label for="email-txt">E-mail</label>
                    <input type="text" id="email-txt" name="email-txt">
                    <label for="password-txt">Senha</label>
                    <input type="password" id="password-txt" name="password-txt" required>
                    <label for="pass-confirmation">Confirmação da senha</label>
                    <input type="password" id="pass-confirmation" name="pass-confirmation" required>
                    <label><input type="checkbox" value="1" name="termsConditions" required><a href="#"> Aceito os termos e condições.</a></label>
                    <button class="btn" type="submit">Entrar</button>           
                </form>
            </div>
            <div class="div-exit">
                <a class="btn" href="index.html">Voltar</a>
            </div> 
        </section>
    </main>
</body>
</html>
